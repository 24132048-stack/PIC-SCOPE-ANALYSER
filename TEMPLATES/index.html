<!DOCTYPE html>
<html>
<head>
    <title>Advanced EXIF Analyzer</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:30px;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        h1{
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#222;
            color:white;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Advanced EXIF Metadata Analyzer</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <button type="submit">
            Analyze
        </button>

    </form>

    {% if metadata %}

    <h2>Metadata</h2>

    <table>

        <tr>
            <th>Tag</th>
            <th>Value</th>
        </tr>

        {% for key,value in metadata.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}

    </table>

    {% endif %}

    {% if gps %}

    <h2>GPS Information</h2>

    <table>

        <tr>
            <th>GPS Field</th>
            <th>Value</th>
        </tr>

        {% for key,value in gps.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}

    </table>

    {% endif %}

</div>

</body>
</html>
